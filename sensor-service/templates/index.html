<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartNode — Wendz</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --blue: #3B52D4;
    --dark: #0D0F14;
    --dark2: #13161D;
    --border: rgba(255,255,255,0.07);
    --text: #FFFFFF;
    --sub: rgba(255,255,255,0.35);
    --dim: rgba(255,255,255,0.12);
  }

  html, body {
    height: 100%;
    background: var(--dark);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  .page {
    height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
  }

  /* TOP BAR */
  .topbar {
    padding: 28px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
  }
  .wordmark {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: 1.4rem;
    letter-spacing: 0.08em;
    color: var(--text);
  }
  .topbar-right {
    font-size: 0.7rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--sub);
    font-weight: 500;
  }

  /* HERO */
  .hero {
    position: relative;
    display: flex;
    align-items: flex-end;
    padding: 40px;
    overflow: hidden;
  }

  /* Giant W */
  .bg-letter {
    position: absolute;
    right: -4vw;
    top: 50%;
    transform: translateY(-50%);
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800;
    font-size: clamp(240px, 38vw, 520px);
    line-height: 0.85;
    color: var(--blue);
    user-select: none;
    pointer-events: none;
    letter-spacing: -0.04em;
  }

  .hero-content { position: relative; z-index: 1; max-width: 480px; }

  .accent-line {
    width: 52px; height: 3px;
    background: var(--blue);
    margin-bottom: 18px;
  }

  .tagline {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: clamp(2.8rem, 5.5vw, 4.8rem);
    letter-spacing: 0.01em;
    line-height: 0.95;
    color: var(--text);
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .tagline .blue { color: var(--blue); }

  .sub-line {
    font-size: 0.75rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--sub);
    font-weight: 500;
  }

  /* NAV GRID */
  .nav-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    border-top: 1px solid var(--border);
  }

  .nav-item {
    text-decoration: none;
    padding: 28px 40px;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 6px;
    transition: background 0.2s;
    position: relative;
    overflow: hidden;
  }
  .nav-item:last-child { border-right: none; }
  .nav-item::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--blue);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.25s ease;
  }
  .nav-item:hover { background: rgba(59,82,212,0.06); }
  .nav-item:hover::before { transform: scaleX(1); }

  .nav-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 1.25rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--text);
  }
  .nav-desc {
    font-size: 0.72rem;
    color: var(--sub);
    letter-spacing: 0.05em;
    font-weight: 400;
  }
  .nav-arrow {
    margin-top: 4px;
    font-size: 0.8rem;
    color: var(--blue);
    font-weight: 600;
    letter-spacing: 0.05em;
  }

  @media (max-width: 640px) {
    .nav-grid { grid-template-columns: 1fr; }
    .nav-item { border-right: none; border-bottom: 1px solid var(--border); }
    .bg-letter { font-size: 50vw; }
    .topbar, .hero, .nav-item { padding-left: 24px; padding-right: 24px; }
  }
</style>
</head>
<body>
<div class="page">

  <div class="topbar">
    <div class="wordmark">WENDZ</div>
    <div class="topbar-right">Smart Vending Node &nbsp;/&nbsp; Control Panel</div>
  </div>

  <div class="hero">
    <div class="bg-letter">W</div>
    <div class="hero-content">
      <div class="accent-line"></div>
      <div class="tagline">Not Another<br><span class="blue">Boring</span> Screen</div>
      <div class="sub-line">SmartNode &nbsp;·&nbsp; Bengaluru, IN</div>
    </div>
  </div>

  <nav class="nav-grid">
    <a class="nav-item" href="/player">
      <div class="nav-label">Ad Player</div>
      <div class="nav-desc">Fullscreen display loop — 32&Prime; kiosk</div>
      <div class="nav-arrow">→</div>
    </a>
    <a class="nav-item" href="/dashboard">
      <div class="nav-label">Live Dashboard</div>
      <div class="nav-desc">14 sensors · real-time WebSocket feed</div>
      <div class="nav-arrow">→</div>
    </a>
    <a class="nav-item" href="/api/sensors">
      <div class="nav-label">Sensor API</div>
      <div class="nav-desc">Raw JSON — all sensor states</div>
      <div class="nav-arrow">→</div>
    </a>
  </nav>

</div>
</body>
</html>
